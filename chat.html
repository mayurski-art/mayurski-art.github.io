<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TROLLCHAT — Trollrunner Live Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --tc-ink: #14231d;
      --tc-line: #10201a;
      --tc-green: #2bd66f;
      --tc-teal: #2fb3a6;
      --tc-yellow: #f4d35e;
      --tc-pink: #ff5ec1;
      --tc-pixel: 'Press Start 2P', 'VT323', monospace;
      --tc-term: 'VT323', 'DM Mono', monospace;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--tc-ink);
      font-family: var(--tc-term);
      background:
        repeating-linear-gradient(0deg, rgba(16,32,26,0.05) 0 2px, transparent 2px 4px),
        radial-gradient(circle at 18% 0%, rgba(43,214,111,0.28), transparent 38%),
        radial-gradient(circle at 86% 8%, rgba(47,179,166,0.26), transparent 32%),
        linear-gradient(180deg, #0f1714, #0a110d);
      image-rendering: pixelated;
    }
    a { color: inherit; }
    button, input { font: inherit; }

    .page { max-width: 1080px; margin: 0 auto; padding: 18px 16px 32px; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand img {
      width: 48px; height: 48px; flex: none;
      border: 3px solid var(--tc-line); border-radius: 4px; background: #fff;
      image-rendering: pixelated; box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    }
    .brand h1 {
      margin: 0; color: #eafff1;
      font-family: var(--tc-pixel); font-size: clamp(15px, 3.4vw, 24px);
      line-height: 1.1; text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    }
    .brand p { margin: 4px 0 0; color: #bfe9cf; font-size: 18px; line-height: 1; }
    .home-link {
      display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
      border: 3px solid var(--tc-line); border-radius: 3px;
      background: linear-gradient(180deg, #ffe27a, var(--tc-yellow)); color: #1a1306;
      padding: 9px 13px; font-family: var(--tc-pixel); font-size: 9px;
      box-shadow: 3px 3px 0 var(--tc-line);
    }
    .home-link:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--tc-line); }

    .room {
      display: grid; grid-template-columns: minmax(220px, 0.7fr) minmax(320px, 1.3fr);
      gap: 16px; align-items: stretch;
    }
    .panel {
      border: 3px solid var(--tc-line); border-radius: 4px; overflow: hidden;
      background: #cfe3cd;
      box-shadow: 0 0 0 3px #cfe3cd, 0 0 0 6px var(--tc-line), 8px 8px 0 6px rgba(0,0,0,0.45);
    }
    /* left mascot column */
    .mascot { padding: 14px; display: flex; flex-direction: column; gap: 12px; min-height: 460px;
      background: repeating-linear-gradient(0deg, rgba(16,32,26,0.05) 0 2px, transparent 2px 4px), linear-gradient(180deg, #f3f8e9, #d7e7cf); }
    .mascot-label { font-family: var(--tc-pixel); font-size: 9px; color: #143524; }
    .mascot-art { flex: 1; display: grid; place-items: center; border: 3px solid var(--tc-line); border-radius: 3px;
      background: linear-gradient(180deg, #fbfdf2, #e7f2df); }
    .mascot-art img { width: min(82%, 220px); height: auto; image-rendering: pixelated; filter: drop-shadow(4px 4px 0 rgba(16,32,26,0.3)); }
    .mascot-online {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      border: 3px solid var(--tc-line); border-radius: 3px; background: #d9ffe6; padding: 10px;
      font-family: var(--tc-pixel); font-size: 11px; color: #0c1a12;
    }
    .mascot-online::before { content:''; width: 11px; height: 11px; border-radius: 50%; background: var(--tc-green);
      box-shadow: 0 0 0 0 rgba(43,214,111,0.7); animation: tc-pulse 1.6s ease-out infinite; }
    .mascot-caption { font-size: 17px; line-height: 1.15; color: #2a4636; }

    /* right chat window */
    .chat { display: grid; grid-template-rows: auto minmax(0,1fr) auto auto auto; gap: 8px; padding: 9px;
      min-height: 460px; background: repeating-linear-gradient(0deg, rgba(16,32,26,0.05) 0 2px, transparent 2px 4px), linear-gradient(180deg, #f3f8e9, #d7e7cf); }
    .titlebar {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      border: 3px solid var(--tc-line); border-radius: 3px; padding: 8px 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0) 45%), linear-gradient(90deg, var(--tc-green), var(--tc-teal) 60%, var(--tc-yellow));
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35), inset 0 -3px 0 rgba(16,32,26,0.25);
    }
    .title-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .title-troll { width: 34px; height: 34px; flex: none; border: 2px solid var(--tc-line); border-radius: 3px; background: #fff; image-rendering: pixelated; box-shadow: 2px 2px 0 rgba(16,32,26,0.45); }
    .title { font-family: var(--tc-pixel); font-size: 13px; color: #0c1a12; text-shadow: 1px 1px 0 rgba(255,255,255,0.5); }
    .subtitle { margin-top: 5px; font-size: 14px; color: #143524; opacity: 0.85; }
    .live { display: inline-flex; align-items: center; gap: 5px; font-family: var(--tc-pixel); font-size: 8px; color: #0c1a12;
      border: 2px solid var(--tc-line); border-radius: 2px; background: #fff; padding: 3px 5px; }
    .live-dot { width: 7px; height: 7px; background: #ff2d3d; border: 1px solid var(--tc-line); animation: tc-blink 1s steps(2,end) infinite; }

    .feed {
      overflow-y: auto; border: 3px solid var(--tc-line); border-radius: 3px; padding: 8px;
      background: linear-gradient(180deg, rgba(0,0,0,0.04), transparent 8%), repeating-linear-gradient(0deg, rgba(47,179,166,0.07) 0 22px, transparent 22px 24px), #fbfdf2;
      scrollbar-width: thin; scrollbar-color: var(--tc-teal) #dfeede;
    }
    .feed::-webkit-scrollbar { width: 10px; }
    .feed::-webkit-scrollbar-track { background: #dfeede; }
    .feed::-webkit-scrollbar-thumb { background: var(--tc-teal); border: 2px solid var(--tc-line); }
    .empty { min-height: 220px; display: grid; place-items: center; gap: 8px; text-align: center; color: #2a4636; padding: 16px; }
    .empty img { width: 100px; height: auto; image-rendering: pixelated; filter: drop-shadow(3px 3px 0 rgba(16,32,26,0.3)); }
    .empty strong { font-family: var(--tc-pixel); font-size: 11px; line-height: 1.6; color: #143524; }
    .empty span { font-size: 17px; opacity: 0.85; }
    .msg { display: grid; grid-template-columns: 26px minmax(0,1fr); gap: 8px; padding: 7px 0; border-bottom: 2px dotted rgba(20,53,36,0.28); }
    .msg:last-child { border-bottom: 0; }
    .msg.is-me .author { color: var(--tc-pink); }
    .avatar { width: 26px; height: 26px; flex: none; border: 2px solid var(--tc-line); border-radius: 3px;
      background-color: #fff; background-image: url('assets/animations/troll-computer-transparent.png'); background-size: 130%; background-position: center 60%; background-repeat: no-repeat;
      image-rendering: pixelated; box-shadow: 2px 2px 0 rgba(16,32,26,0.35); }
    .name-row { display: flex; align-items: baseline; flex-wrap: wrap; gap: 7px; line-height: 1; }
    .author { font-family: var(--tc-pixel); font-size: 8px; color: #0f6b3c; word-break: break-word; }
    .time { font-size: 13px; color: rgba(20,53,36,0.55); }
    .text { margin-top: 4px; font-size: 17px; line-height: 1.15; color: #16261d; word-break: break-word; }

    .typing { min-height: 18px; display: flex; align-items: center; gap: 7px; font-size: 15px; color: #2a4636; }
    .typing img { width: 20px; height: 20px; display: none; image-rendering: pixelated; }
    .typing.is-active img { display: inline-block; }
    .typing.is-active::after { content: '_'; font-family: var(--tc-pixel); font-size: 9px; animation: tc-blink 0.7s steps(2,end) infinite; }

    .composer { display: grid; grid-template-columns: minmax(86px, 130px) minmax(0,1fr) auto; gap: 7px; }
    .name-input, .msg-input { min-width: 0; width: 100%; border: 3px solid var(--tc-line); border-radius: 3px; background: #fbfdf2; color: #16261d; padding: 9px 10px; font: 17px var(--tc-term); box-shadow: inset 2px 2px 0 rgba(16,32,26,0.12); }
    .name-input::placeholder, .msg-input::placeholder { color: rgba(20,53,36,0.45); }
    .name-input:focus, .msg-input:focus { outline: none; border-color: var(--tc-teal); background: #fff; }
    .send { border: 3px solid var(--tc-line); border-radius: 3px; background: linear-gradient(180deg, #ffe27a, var(--tc-yellow)); color: #1a1306; padding: 7px 14px; font-family: var(--tc-pixel); font-size: 9px; cursor: pointer; box-shadow: 3px 3px 0 var(--tc-line); }
    .send:hover { background: linear-gradient(180deg, #fff0a8, #ffd94e); }
    .send:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--tc-line); }
    .note { min-height: 14px; font-size: 14px; line-height: 1.15; color: #5a6f5e; }

    @keyframes tc-blink { 50% { opacity: 0.25; } }
    @keyframes tc-pulse { 0% { box-shadow: 0 0 0 0 rgba(43,214,111,0.65); } 100% { box-shadow: 0 0 0 9px rgba(43,214,111,0); } }

    @media (max-width: 720px) {
      .room { grid-template-columns: 1fr; }
      .mascot { min-height: 0; order: 2; flex-direction: row; align-items: center; }
      .mascot-art { display: none; }
      .chat { min-height: 70vh; }
      .composer { grid-template-columns: minmax(76px, 100px) minmax(0,1fr) auto; }
    }
    @media (prefers-reduced-motion: reduce) {
      .live-dot, .mascot-online::before, .typing.is-active::after { animation: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand">
        <img src="assets/animations/troll-grin.gif" alt="" aria-hidden="true">
        <div>
          <h1>TROLLCHAT</h1>
          <p>Trade Less, Troll More</p>
        </div>
      </div>
      <a class="home-link" href="index.html">&#x2190; Home</a>
    </div>

    <section class="room" aria-label="Trollchat live room">
      <aside class="panel mascot" aria-hidden="true">
        <div class="mascot-label">RUNNER LOBBY</div>
        <div class="mascot-art"><img src="assets/animations/troll-lel_transparent.gif" alt=""></div>
        <div class="mascot-online"><span id="tc-online-num">1</span>&nbsp;online</div>
        <div class="mascot-caption">Same room as the one on the homepage. Keep it trolly.</div>
      </aside>

      <section class="panel chat" aria-label="Live chat">
        <div class="titlebar">
          <div class="title-left">
            <img class="title-troll" src="assets/animations/troll-grin.gif" alt="" aria-hidden="true">
            <div>
              <div class="title">TROLLCHAT</div>
              <div class="subtitle">live &middot; one room</div>
            </div>
          </div>
          <span class="live"><span class="live-dot" aria-hidden="true"></span>LIVE</span>
        </div>

        <div id="tc-feed" class="feed" role="log" aria-live="polite" aria-relevant="additions text"></div>
        <div id="tc-typing" class="typing" aria-live="polite">
          <img src="assets/animations/troll-typer.gif" alt="" aria-hidden="true">
          <span id="tc-typing-text"></span>
        </div>

        <form id="tc-form" class="composer" autocomplete="off">
          <input id="tc-name" class="name-input" type="text" maxlength="24" placeholder="name" aria-label="Your display name" autocomplete="nickname">
          <input id="tc-input" class="msg-input" type="text" maxlength="240" placeholder="say something trolly…" aria-label="Message" autocomplete="off">
          <button id="tc-send" class="send" type="submit">SEND</button>
        </form>
        <div id="tc-note" class="note"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/admin-auth.js"></script>
  <script src="assets/js/site-lock.js"></script>
  <script src="assets/js/troll-notis.js"></script>
  <script>
  /* TROLLCHAT standalone — shares the SAME channel + table + identity as the
     embedded homepage widget, so it's literally the same live room. */
  (function () {
    const SUPABASE_URL = 'https://tjsyhfplxjtakdfkpdtg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqc3loZnBseGp0YWtkZmtwZHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzOTc0ODksImV4cCI6MjA5MTk3MzQ4OX0.xLUcPUUguRBQttNwiIRWJHxjJjLqrQDMu4Ubsk5yZoQ';
    const TC_CHANNEL = 'trollchat_room_v2';
    const TC_TABLE = 'troll_chat';
    const TC_NAME_KEY = 'trollchat_name_v1';
    const TC_ID_KEY = 'trollchat_guest_id_v1';
    const TC_CACHE_KEY = 'trollchat_cache_v1';
    const TC_MSG_MAX = 240, TC_KEEP = 80, TC_HISTORY = 60;
    const TC_COOLDOWN_MS = 1500, TC_TYPING_TTL_MS = 3200;
    const NAME_COLORS = ['#0f6b3c', '#1565c0', '#b8431f', '#7b1fa2', '#0097a7', '#c2185b', '#5d4037', '#2e7d32'];

    const state = {
      guestId: '', name: '', client: null, channel: null, subscribed: false,
      persistOk: null, messages: [], seen: new Set(), typingPeers: new Map(),
      lastSendAt: 0, typingSentAt: 0,
    };
    const els = {};

    function guestId() {
      let id = '';
      try { id = localStorage.getItem(TC_ID_KEY) || ''; } catch {}
      if (!id) { id = (crypto.randomUUID ? crypto.randomUUID() : 'guest-' + Date.now() + '-' + Math.random().toString(16).slice(2)); try { localStorage.setItem(TC_ID_KEY, id); } catch {} }
      return id;
    }
    function defaultName() {
      let n = '';
      try { n = localStorage.getItem(TC_NAME_KEY) || ''; } catch {}
      return (n || 'Troll ' + Math.floor(100 + Math.random() * 900)).slice(0, 24);
    }
    function nameColor(name) {
      let h = 0; const s = String(name || '');
      for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
      return NAME_COLORS[h % NAME_COLORS.length];
    }
    function loadCache() { try { const r = JSON.parse(localStorage.getItem(TC_CACHE_KEY) || '[]'); return Array.isArray(r) ? r : []; } catch { return []; } }
    function saveCache() { try { localStorage.setItem(TC_CACHE_KEY, JSON.stringify(state.messages.slice(-TC_HISTORY))); } catch {} }
    function fmtTime(v) { const d = v ? new Date(v) : new Date(); return Number.isNaN(d.getTime()) ? '' : d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

    function normalize(raw) {
      if (!raw || typeof raw !== 'object') return null;
      const id = String(raw.id || '').trim();
      const text = String(raw.text != null ? raw.text : raw.body || '').trim().slice(0, TC_MSG_MAX);
      if (!id || !text) return null;
      return { id, name: (String(raw.name || 'Guest').trim() || 'Guest').slice(0, 24), text, ts: String(raw.ts || raw.created_at || new Date().toISOString()) };
    }

    function renderFeed() {
      els.feed.innerHTML = '';
      if (!state.messages.length) {
        const empty = document.createElement('div'); empty.className = 'empty';
        const img = document.createElement('img'); img.src = 'assets/animations/troll-lel_transparent.gif'; img.alt = '';
        const strong = document.createElement('strong'); strong.textContent = 'NO TROLLS YET';
        const span = document.createElement('span'); span.textContent = 'be the first to say something.';
        empty.append(img, strong, span); els.feed.appendChild(empty); return;
      }
      state.messages.forEach(m => {
        const row = document.createElement('article'); row.className = 'msg'; if (m.name === state.name) row.classList.add('is-me');
        const avatar = document.createElement('span'); avatar.className = 'avatar'; avatar.setAttribute('aria-hidden', 'true');
        const body = document.createElement('div');
        const head = document.createElement('div'); head.className = 'name-row';
        const name = document.createElement('span'); name.className = 'author'; name.textContent = m.name; if (m.name !== state.name) name.style.color = nameColor(m.name);
        const time = document.createElement('span'); time.className = 'time'; time.textContent = fmtTime(m.ts);
        const text = document.createElement('div'); text.className = 'text'; text.textContent = m.text;
        head.append(name, time); body.append(head, text); row.append(avatar, body); els.feed.appendChild(row);
      });
      els.feed.scrollTop = els.feed.scrollHeight;
    }

    function addMessage(raw, opts) {
      opts = opts || {};
      const m = normalize(raw);
      if (!m || state.seen.has(m.id)) return false;
      state.seen.add(m.id); state.messages.push(m);
      state.messages.sort((a, b) => Date.parse(a.ts) - Date.parse(b.ts));
      if (state.messages.length > TC_KEEP) { state.messages = state.messages.slice(-TC_KEEP); state.seen = new Set(state.messages.map(x => x.id)); }
      if (m.name) state.typingPeers.forEach((v, k) => { if (v.name === m.name) state.typingPeers.delete(k); });
      if (!opts.silent) { renderFeed(); renderTyping(); }
      saveCache(); return true;
    }

    function renderOnline(n) { els.onlineNum.forEach(el => { el.textContent = String(Math.max(1, Number(n) || 1)); }); }
    function syncPresence() {
      if (!state.channel) { renderOnline(1); return; }
      const st = state.channel.presenceState(); const ids = new Set();
      Object.values(st || {}).forEach(arr => { if (Array.isArray(arr)) arr.forEach(e => { if (e && e.id) ids.add(e.id); }); });
      renderOnline(ids.size || 1);
    }

    function renderTyping() {
      const now = Date.now(); const names = [];
      state.typingPeers.forEach((v, k) => { if (v.until <= now) { state.typingPeers.delete(k); return; } if (v.name && v.name !== state.name) names.push(v.name); });
      if (!names.length) { els.typing.classList.remove('is-active'); els.typingText.textContent = ''; return; }
      els.typing.classList.add('is-active');
      const u = Array.from(new Set(names)).slice(0, 3);
      els.typingText.textContent = u.length === 1 ? u[0] + ' is typing' : u.join(', ') + ' are typing';
    }

    function setNote(msg) { els.note.textContent = msg || ''; }
    function updateNote() { setNote(state.persistOk === false ? 'Live only — chat history isn’t being saved yet.' : ''); }

    async function fetchHistory() {
      try {
        const qs = new URLSearchParams({ select: 'id,name,body,created_at', order: 'created_at.desc', limit: String(TC_HISTORY) });
        const res = await fetch(SUPABASE_URL + '/rest/v1/' + TC_TABLE + '?' + qs.toString(), { headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY } });
        if (!res.ok) { state.persistOk = false; updateNote(); return; }
        const rows = await res.json();
        if (Array.isArray(rows)) { rows.reverse().forEach(r => addMessage(r, { silent: true })); renderFeed(); }
        state.persistOk = true; updateNote();
      } catch { state.persistOk = false; updateNote(); }
    }

    async function persist(m) {
      if (state.persistOk === false) return;
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/' + TC_TABLE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY, Prefer: 'return=minimal' },
          body: JSON.stringify([{ id: m.id, name: m.name, body: m.text, created_at: m.ts }]),
        });
        const ok = res.ok || res.status === 409;
        if (state.persistOk !== ok) { state.persistOk = ok; updateNote(); }
      } catch { if (state.persistOk !== false) { state.persistOk = false; updateNote(); } }
    }

    function broadcastTyping() {
      if (!state.channel || !state.subscribed) return;
      const now = Date.now(); if (now - state.typingSentAt < 1200) return; state.typingSentAt = now;
      state.channel.send({ type: 'broadcast', event: 'typing', payload: { id: state.guestId, name: state.name } });
    }

    async function send(text) {
      const t = String(text || '').trim(); if (!t) return false;
      const now = Date.now();
      if (now - state.lastSendAt < TC_COOLDOWN_MS) { setNote('Whoa, slow down a sec…'); setTimeout(updateNote, 1200); return false; }
      state.lastSendAt = now;
      const m = { id: (crypto.randomUUID ? crypto.randomUUID() : state.guestId + '-' + now + '-' + Math.random().toString(16).slice(2)), name: state.name, text: t.slice(0, TC_MSG_MAX), ts: new Date(now).toISOString() };
      addMessage(m);
      if (state.channel && state.subscribed) state.channel.send({ type: 'broadcast', event: 'msg', payload: m });
      persist(m); return true;
    }

    function startRealtime() {
      if (!window.supabase || !window.supabase.createClient) { renderOnline(1); return; }
      try {
        state.client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { autoRefreshToken: false, persistSession: false } });
        state.channel = state.client.channel(TC_CHANNEL, { config: { presence: { key: state.guestId }, broadcast: { self: false } } });
        state.channel
          .on('broadcast', { event: 'msg' }, ({ payload }) => addMessage(payload))
          .on('broadcast', { event: 'typing' }, ({ payload }) => {
            if (!payload || payload.id === state.guestId) return;
            state.typingPeers.set(String(payload.id), { name: String(payload.name || 'Someone').slice(0, 24), until: Date.now() + TC_TYPING_TTL_MS });
            renderTyping();
          })
          .on('presence', { event: 'sync' }, syncPresence)
          .subscribe(s => { if (s === 'SUBSCRIBED') { state.subscribed = true; state.channel.track({ id: state.guestId, name: state.name }); } });
      } catch { state.channel = null; }
    }

    function init() {
      els.feed = document.getElementById('tc-feed');
      els.typing = document.getElementById('tc-typing');
      els.typingText = document.getElementById('tc-typing-text');
      els.note = document.getElementById('tc-note');
      els.onlineNum = Array.from(document.querySelectorAll('#tc-online-num'));
      const nameInput = document.getElementById('tc-name');
      const msgInput = document.getElementById('tc-input');
      const form = document.getElementById('tc-form');
      if (!els.feed || !form) return;

      state.guestId = guestId(); state.name = defaultName(); nameInput.value = state.name;
      loadCache().forEach(x => addMessage(x, { silent: true }));
      renderFeed(); renderOnline(1);

      nameInput.addEventListener('input', () => {
        state.name = (String(nameInput.value || '').trim() || 'Guest').slice(0, 24);
        try { localStorage.setItem(TC_NAME_KEY, state.name); } catch {}
        if (state.channel && state.subscribed) state.channel.track({ id: state.guestId, name: state.name });
      });
      msgInput.addEventListener('input', broadcastTyping);
      form.addEventListener('submit', e => { e.preventDefault(); send(msgInput.value).then(ok => { if (ok) msgInput.value = ''; }); });

      startRealtime();
      fetchHistory();
      setInterval(renderTyping, 1500);
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, { once: true });
    else init();
  })();
  </script>
</body>
</html>
