<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080b15">
  <title>Trollrunner Arcade</title>
  <script>
    (() => {
      if (window.location.hostname === 'games.trollrunner.net' && window.location.pathname === '/games.html') {
        window.history.replaceState(null, '', '/');
      }
    })();
  </script>
  <link rel="canonical" href="https://games.trollrunner.net/">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-game-state="start">
  <main class="game-shell" aria-label="Trollrunner endless runner">
    <canvas id="gameCanvas" aria-label="Trollrunner game canvas"></canvas>

    <section class="hud" aria-label="Game stats">
      <div class="hud-item">
        <span>Score</span>
        <strong id="scoreValue">0</strong>
      </div>
      <div class="hud-item">
        <span>Coins</span>
        <strong id="coinValue">0</strong>
      </div>
      <div class="hud-item">
        <span>Best</span>
        <strong id="bestValue">0</strong>
      </div>
    </section>

    <section id="startScreen" class="screen start-screen is-visible" aria-label="Start screen">
      <div class="intro-stage">
        <img
          class="intro-art"
          src="/assets/images/troll-gamewithmefigure.png"
          alt="Trollrunner holding a controller in front of a game screen"
        >
        <div class="tv-glow" aria-hidden="true"></div>
      </div>
      <div class="screen-copy">
        <p class="eyebrow">Trollrunner presents</p>
        <h1>Trollrunner Arcade</h1>
        <p class="tagline">Dodge red candles, scoop troll coins, and outrun pure internet market chaos.</p>
        <button id="playButton" class="primary-action" type="button">Play</button>
      </div>
    </section>

    <section id="gameOverScreen" class="screen game-over-screen" aria-label="Game over screen">
      <div class="result-panel">
        <p class="eyebrow">Game over</p>
        <h2>rekt by the market</h2>
        <div class="result-grid">
          <div>
            <span>Final</span>
            <strong id="finalScoreValue">0</strong>
          </div>
          <div>
            <span>Coins</span>
            <strong id="finalCoinValue">0</strong>
          </div>
          <div>
            <span>Best</span>
            <strong id="finalBestValue">0</strong>
          </div>
        </div>
        <button id="restartButton" class="primary-action" type="button">Restart</button>
      </div>
    </section>

    <nav class="touch-controls" aria-label="Mobile controls">
      <button type="button" data-control="left" aria-label="Move left">Left</button>
      <button type="button" data-control="jump" aria-label="Jump">Jump</button>
      <button type="button" data-control="slide" aria-label="Slide">Slide</button>
      <button type="button" data-control="right" aria-label="Move right">Right</button>
    </nav>
  </main>

  <script src="/game.js" defer></script>
</body>
</html>
