<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troll Sticker Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Troll Sticker Tracker</h1>
    <div id="map"></div>
    <div id="data-table-container">
        <input type="text" id="search" placeholder="Search..." />
        <table id="data-table">
            <thead>
                <tr>
                    <th>Location</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                </tr>
            </thead>
            <tbody>
                <!-- Sticker location entries will be injected here -->
            </tbody>
        </table>
    </div>
    <div id="summary-statistics">
        <div class="card"><span>Total Stickers:</span><span id="total-stickers"></span></div>
        <div class="card"><span>Unique Locations:</span><span id="unique-locations"></span></div>
    </div>
    <script>
        const stickerData = [
            { "location": "Location 1", "latitude": 12.34, "longitude": 56.78 },
            { "location": "Location 2", "latitude": 23.45, "longitude": 67.89 },
            // ... 29 more sticker entries ...
            { "location": "Location 31", "latitude": 90.12, "longitude": 34.56 }
        ];

        function initMap() {
            // Initialize your map here with stickerData
        }

        function populateTable() {
            const tableBody = document.querySelector('#data-table tbody');
            stickerData.forEach(sticker => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${sticker.location}</td><td>${sticker.latitude}</td><td>${sticker.longitude}</td>`;
                tableBody.appendChild(row);
            });

            // Interactive search and sort functionality can be added here
        }

        function updateStatistics() {
            document.getElementById('total-stickers').innerText = stickerData.length;
            const uniqueLocations = new Set(stickerData.map(sticker => sticker.location));
            document.getElementById('unique-locations').innerText = uniqueLocations.size;
        }

        $(document).ready(function() {
            initMap();
            populateTable();
            updateStatistics();
        });
    </script>
</body>
</html>
