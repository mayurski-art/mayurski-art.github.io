<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧌 Troll Runner</title>
    <style>
        body {
            background: linear-gradient(to right, pink, blue);
            font-family: Arial, sans-serif;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        #map {
            height: 400px;
            margin-top: 20px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
<header>
    <h1>🧌 Troll Runner</h1>
</header>
<div class="container">
    <section>
        <h2>Biography</h2>
        <p>Your biography goes here...</p>
    </section>
    <section>
        <div class='stats'>
            <div>Total Stickers: 77</div>
            <div>Cities Visited: 5</div>
            <div>Date Range: Your date range here...</div>
        </div>
    </section>
    <section>
        <h2>Locations</h2>
        <table id="data-table" border="1">
            <thead>
                <tr>
                    <th>City</th>
                    <th>State</th>
                    <th>Stickers</th>
                </tr>
            </thead>
            <tbody>
               <!-- Data Rows Generated Here -->
            </tbody>
        </table>
    </section>
    <section id="map"></section>
</div>
<script>
    // Initialize the map
    var map = L.map('map').setView([37.7749, -122.4194], 5);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // City markers (example coordinates)
    var markerData = [
        { "city": "City1", "coords": [37.7749, -122.4194] },
        { "city": "City2", "coords": [34.0522, -118.2437] },
        { "city": "City3", "coords": [40.7128, -74.0060] },
        { "city": "City4", "coords": [41.8781, -87.6298] },
        { "city": "City5", "coords": [30.2672, -97.7431] }
    ];

    markerData.forEach(function(data) {
        L.marker(data.coords).addTo(map)
            .bindPopup(data.city);
    });

    // Fetch CSV data and populate the data table (not fully implemented here)
    // Add functionality for searching and sorting the table
</script>
</body>
</html>
