<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Runner Admin</title>
<style>
body { font-family: 'DM Sans', sans-serif; background:#1c1c1e; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
.admin-container { background:#fff; color:#1c1c1e; padding:24px; border-radius:14px; width:350px; box-shadow:0 8px 32px rgba(0,0,0,0.2); }
.admin-container h3 { margin-bottom:12px; }
.admin-container label { display:block; margin-bottom:8px; font-size:14px; }
.admin-container input { width:100%; padding:6px 8px; margin-top:2px; border-radius:6px; border:1px solid #ccc; }
.admin-container button { margin-top:12px; padding:10px 14px; border:none; border-radius:8px; background:#007aff; color:#fff; cursor:pointer; }
</style>
</head>
<body>

<div class="admin-container">
  <h3>Admin Panel</h3>

  <label>City:<input type="text" id="admin-city" placeholder="Fontana"></label>
  <label>Name / Location:<input type="text" id="admin-name" placeholder="Almeria Park"></label>
  <label>Date:<input type="date" id="admin-date"></label>
  <label>Sticker Count:<input type="number" id="admin-count" min="1" value="1"></label>
  <label>X %:<input type="number" id="admin-px" min="0" max="100" value="50"></label>
  <label>Y %:<input type="number" id="admin-py" min="0" max="100" value="50"></label>

  <button onclick="addDrop()">Add Drop</button>
</div>

<script>
const ADMIN_PASSWORD = "troll123";

// Prompt for password on page load
const pass = prompt("Enter admin password:");
if(pass !== ADMIN_PASSWORD) {
  alert("Incorrect password!");
  window.location.href = "index.html"; // redirect to public page
}

// Add drop to localStorage for persistence
function addDrop() {
  const city  = document.getElementById('admin-city').value.trim();
  const name  = document.getElementById('admin-name').value.trim();
  const date  = document.getElementById('admin-date').value;
  const count = parseInt(document.getElementById('admin-count').value) || 1;
  const px    = parseFloat(document.getElementById('admin-px').value);
  const py    = parseFloat(document.getElementById('admin-py').value);

  if(!city || !name || !date || isNaN(px) || isNaN(py)) {
    alert("Please fill all fields correctly!");
    return;
  }

  // Read current drops
  let drops = JSON.parse(localStorage.getItem('TROLL_DROPS') || '[]');
  drops.push({city,name,date,count,px,py});
  localStorage.setItem('TROLL_DROPS', JSON.stringify(drops));
  alert("Drop added successfully!");
  window.location.reload();
}
</script>
</body>
</html>
