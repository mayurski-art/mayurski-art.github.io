<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troll Runner Live Status</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111218;
      color: #fff;
    }
    .card {
      width: min(560px, calc(100% - 32px));
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: #1a1c24;
      padding: 18px;
    }
    p {
      color: rgba(255,255,255,0.76);
      line-height: 1.5;
    }
    a { color: #66aaff; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Live Status Control</h1>
    <p>The live popup is managed from <a href="../admin.html">admin access</a>. Use the on/off controls there to show or hide the "Live: Currently trolling around..." badge on the homepage.</p>
  </main>
</body>
</html>
