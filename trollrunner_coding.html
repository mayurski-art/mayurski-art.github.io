<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Runner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ff6ec7, #1f8fff); color: #fff; text-align:center; }
    header { padding: 50px; font-size: 2.5em; font-weight: bold; text-shadow: 2px 2px 6px rgba(0,0,0,0.3); }
    section { padding: 40px; }
    #map { height: 500px; margin: 20px auto; max-width: 90%; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.4); }
    a { color: #ffeb3b; text-decoration: none; font-weight: bold; }
    a:hover { text-decoration: underline; }
    .sticker-popup img { width: 50px; height: 50px; display:block; margin: auto; }
</style>
</head>
<body>

<header>
🧌 Troll Runner
<div style="font-size: 0.5em;">Running the world, one troll at a time</div>
</header>

<section>
<h2>Biography</h2>
<p>I run around the world one mile at a time placing trollface stickers. Over 80 stickers dropped across Southern California (so far)!</p>
</section>

<section>
<h2>Sticker Map</h2>
<div id="map"></div>
</section>

<section>
<h2>Follow Me</h2>
<a href="https://x.com/YourAccount1" target="_blank">X Account 1</a><br>
<a href="https://x.com/YourAccount2" target="_blank">X Account 2</a>
</section>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // Initialize map
    var map = L.map('map').setView([34.05, -118.25], 8);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    // Sticker locations (example, replace with all 80+ locations)
    var locations = [
        { city: "Los Angeles", lat: 34.05, lng: -118.25, stickers: 5 },
        { city: "San Diego", lat: 32.72, lng: -117.16, stickers: 3 },
        { city: "San Bernardino", lat: 34.11, lng: -117.29, stickers: 2 }
    ];

    // Add markers
    locations.forEach(function(loc) {
        var popupContent = `
            <div class="sticker-popup">
                <img src="https://i.imgur.com/4AiXzf8.png" alt="Trollface">
                <strong>${loc.city}</strong><br>
                Stickers placed: ${loc.stickers}
            </div>
        `;
        L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(popupContent);
    });
</script>

</body>
</html>
